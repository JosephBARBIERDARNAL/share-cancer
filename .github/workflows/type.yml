name: Typing

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-formatting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install ty
        run: uv pip install ty

      - name: Run ty check
        run: uv run ty check
